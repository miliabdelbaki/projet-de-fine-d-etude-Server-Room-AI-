<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fond sombre -->
  <rect width="100" height="100" fill="#0d1117" rx="18"/>

  <!-- Hexagone orange -->
  <polygon
    points="50,8 88,28 88,72 50,92 12,72 12,28"
    fill="#ff6f00"
    opacity="0.15"
  />
  <polygon
    points="50,12 84,30 84,70 50,88 16,70 16,30"
    fill="none"
    stroke="#ff6f00"
    stroke-width="3"
  />

  <!-- Icône serveur stylisée (3 barres horizontales avec points) -->
  <!-- Barre serveur 1 -->
  <rect x="28" y="32" width="44" height="10" rx="2" fill="#ff6f00" opacity="0.9"/>
  <circle cx="66" cy="37" r="2.5" fill="#0d1117"/>
  <circle cx="60" cy="37" r="2.5" fill="#0d1117"/>
  <!-- Barre serveur 2 -->
  <rect x="28" y="45" width="44" height="10" rx="2" fill="#ff6f00" opacity="0.6"/>
  <circle cx="66" cy="50" r="2.5" fill="#0d1117"/>
  <circle cx="60" cy="50" r="2.5" fill="#0d1117"/>
  <!-- Barre serveur 3 -->
  <rect x="28" y="58" width="44" height="10" rx="2" fill="#ff6f00" opacity="0.3"/>
  <circle cx="66" cy="63" r="2.5" fill="#0d1117"/>
  <circle cx="60" cy="63" r="2.5" fill="#0d1117"/>

  <!-- Point lumineux vert (status online) -->
  <circle cx="35" cy="37" r="3" fill="#00e676"/>
</svg>
