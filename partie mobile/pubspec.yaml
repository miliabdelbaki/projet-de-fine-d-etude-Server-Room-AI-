name: technicien_app
description: App mobile technicien
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  http: ^0.13.6
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/ggv.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/ggv.png